<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <main class="conteudo">
            
            <header class="conteudo-titulo">
                <h1 class="titulo-principal">GERADOR_DE_SENHAS</h1>
                <p class="titulo-secundario">Gere senhas criptográficas fortes instantaneamente.</p>
            </header>

            <section class="card-senha">
                <input type="text" id="campo-senha" readonly placeholder="Clique em gerar...">
                <button id="btn-copiar" class="btn-secundario" title="Copiar Senha">Copiar</button>
            </section>

            <section class="card-parametros">
                <h2 class="parametro-titulo">Configurações</h2>
                
                <div class="controle-grupo">
                    <div class="slider-header">
                        <span class="label">Comprimento da senha</span>
                        <span id="valor-tamanho" class="valor-display">12</span>
                    </div>
                    <input type="range" id="slider-tamanho" min="6" max="32" value="12" class="custom-slider">
                </div>

                <button id="btn-gerar" class="btn-principal">GERAR NOVA SENHA</button>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
