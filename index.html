<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Gerador de Senhas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="conteudo">
        <header class="conteudo-titulo">
            <h1 class="titulo-principal">Gerador de Senhas</h1>
            <p class="titulo-secundario">Crie senhas fortes e seguras instantaneamente</p>
        </header>

        <section class="conteudo-senha">
            <input type="text" id="campo-senha" readonly value="S3nh4@F0rt3">
            <div class="parametro-senha-botoes">
                <button class="parametro-senha__botao">Copiar</button>
            </div>
        </section>

        <section class="parametro">
            <h2 class="parametro-titulo">Personalize sua senha</h2>
            
            <div class="parametro-senha">
                <div class="parametro-coluna__senha">
                    <span class="parametro-senha__titulo">Número de caracteres</span>
                    <span class="parametro-senha__texto">12</span>
                </div>
            </div>
        </section>
    </main>
